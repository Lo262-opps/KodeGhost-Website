<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KodeGhost - Get Started</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f1c;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* Navigation */
    nav {
      margin-bottom: 30px;
    }
    nav a {
      color: #00c3ff;
      text-decoration: none;
      font-weight: bold;
      margin: 0 15px;
    }
    nav a:hover {
      color: #00f0ff;
    }

    h1, h2 {
      color: #00c3ff;
    }

    /* Form Styling */
    form {
      display: inline-block;
      text-align: left;
      max-width: 350px;
      width: 100%;
      margin: 20px auto;
    }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    input, textarea {
      background: #1a2236;
      color: white;
    }
    input::placeholder, textarea::placeholder {
      color: #aaa;
    }
    button {
      background: #00c3ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #00f0ff;
      transform: scale(1.05);
    }

    /* Thank You Message */
    .thank-you {
      display: none;
      color: #00ff99;
      font-weight: bold;
      margin-top: 20px;
    }

    /* Services Section */
    .services {
      margin-top: 40px;
      text-align: center;
    }
    .services h2 {
      margin-bottom: 20px;
    }
    .services ul {
      list-style: none;
      padding: 0;
    }
    .services li {
      margin: 10px 0;
      font-size: 18px;
      color: #00c3ff;
    }

    /* Responsive */
    @media (max-width: 400px) {
      form {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a> | 
    <a href="get-started.html">Get Started</a>
  </nav>

  <!-- Page Header -->
  <h1>Get Started with KodeGhost Technology</h1>
  <p>Fill your details below and we’ll contact you fast.</p>

  <!-- Contact Form -->
  <form id="contact-form" action="https://formspree.io/f/xdapojkz" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="4" placeholder="Your Message"></textarea>
    <button type="submit">Submit</button>
  </form>

  <!-- Thank You Message -->
  <p class="thank-you" id="thank-you-msg">Thank you! We’ll contact you soon. ✅</p>

  <!-- Services Section -->
  <div class="services">
    <h2>Our Services</h2>
    <ul>
      <li>🌐 Website Design</li>
      <li>🎨 Logo Design</li>
      <li>💻 Tech Solutions</li>
      <li>🤖 Automation Bots</li>
    </ul>
  </div>

  <!-- Form Submission Script -->
  <script>
    const form = document.getElementById('contact-form');
    const thankYou = document.getElementById('thank-you-msg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const data = new FormData(form);

      fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        if (response.ok) {
          form.style.display = 'none';
          thankYou.style.display = 'block';
        } else {
          alert('Oops! There was a problem. Please try again.');
        }
      }).catch(error => {
        alert('Oops! There was a problem. Please try again.');
      });
    });
  </script>

</body>
</html>
