  body{background:#0a0f1c;color:white;font-family:Arial,sans-serif;padding:20px;text-align:center;}

  form{display:inline-block;text-align:left; max-width:350px; width:100%; margin:20px auto;}

  <h1>Contact Us</h1>
  <p>Send us a message and we will respond quickly!</p>

  <form action="https://formspree.io/f/xdapojkz" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>

    <button type="submit">Send Message</button>
